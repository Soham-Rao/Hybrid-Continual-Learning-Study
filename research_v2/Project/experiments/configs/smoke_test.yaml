# Permuted MNIST — smoke test (3 tasks, 1 seed, 1 epoch, no figures)
# Run: python experiments/run_experiment.py --config experiments/configs/smoke_test.yaml --seed 42 --device cuda
dataset: permuted_mnist
dataset_image_size: 32
model: slim_resnet18
method: fine_tune
n_tasks: 3
n_epochs: 1
batch_size: 128
num_workers: 2
lr: 0.03
fp16: false
seeds: [42]
